name: CAD Worker CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'apps/cad-worker/**'
      - '.github/workflows/cad-worker-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'apps/cad-worker/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cad-worker

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/cad-worker/requirements.txt

      - name: Install dependencies
        working-directory: apps/cad-worker
        run: |
          pip install --upgrade pip
          # Install test dependencies only (skip build123d for CI speed)
          pip install fastapi uvicorn pydantic pydantic-settings httpx pytest pytest-asyncio

      - name: Run tests (no build123d)
        working-directory: apps/cad-worker
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_generators_geometry.py \
            -k "not geometry" \
            2>&1
        env:
          PYTHONPATH: .

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        working-directory: apps/cad-worker
        run: ruff check app/ tests/ --output-format=github

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/cad-worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-production:
    name: Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ai4u-cad-worker
          region: us-central1
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          flags: >
            --memory=2Gi
            --cpu=2
            --min-instances=0
            --max-instances=10
            --concurrency=4
            --timeout=300
          env_vars: |
            ARTIFACTS_DIR=/app/artifacts
            ALLOWED_ORIGINS=${{ secrets.WEB_APP_URL }}
          secrets: |
            SENTRY_DSN=cad-worker-sentry-dsn:latest
